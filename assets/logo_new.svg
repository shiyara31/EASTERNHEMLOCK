<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular Frame -->
  <circle cx="100" cy="100" r="85" stroke="#7CB3BF" stroke-width="2" opacity="0.4" />
  
  <!-- Leaf 1 (Top) -->
  <path d="M100 30 C 140 30, 170 60, 170 100 C 170 140, 140 170, 100 170 C 60 170, 30 140, 30 100" stroke="#7CB3BF" stroke-width="3" stroke-linecap="round" opacity="0.8" />
  
  <!-- Stylized leaf veins/curves -->
  <path d="M60 85 Q 100 50 140 85" stroke="#7CB3BF" stroke-width="2" stroke-linecap="round" opacity="0.6" />
  <path d="M60 115 Q 100 150 140 115" stroke="#7CB3BF" stroke-width="2" stroke-linecap="round" opacity="0.6" />
  
  <!-- Yin-Yang Leaf Concept -->
  <path d="M100 40 C 60 40, 40 70, 40 100 C 40 130, 70 160, 100 160" stroke="#7CB3BF" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.3" />
  
</svg>
