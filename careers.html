                </button>
            </div>
        </div>
    </nav>

    <!-- Menu Overlay -->
    <div class="menu-overlay">
        <div class="menu-bg"></div>

            </div>

            <div class="menu-center">
                <ul class="nav-large-links">

                    <li><a href="careers.html" class="menu-link" data-text="Careers">Careers</a></li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Careers Page Content -->
    <section class="careers-hero bg-black">
        <div class="container">
            <h1 class="fade-slide-up">Join the <i>Artistry</i></h1>
            <p class="fade-slide-up" style="margin-top: 20px; opacity: 0.6; letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem;">Elevate luxury with Eastern Hemlock</p>
        </div>
    </section>

    <section class="careers-form-section section-spaced bg-black">
        <div class="container">
            <div class="form-container fade-slide-up">
                <form action="#" class="luxury-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" placeholder="+971 00 000 0000" required>
                    </div>
                    <div class="form-group">
                        <label>Position Applied For</label>
                        <select required>
                            <option value="" disabled selected>Select a position</option>
                            <option value="architect">Lead Architect</option>
                            <option value="designer">Interior Designer</option>
                            <option value="landscape">Landscape Consultant</option>
                            <option value="pool">Pool Technician</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>Message / Cover Letter</label>
                        <textarea rows="5" placeholder="Tell us about your passion..."></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label>Resume / CV upload</label>
                        <div class="file-upload">
                            <input type="file" id="cv-upload" style="display:none;" required>
                            <label for="cv-upload" style="cursor:pointer; color: var(--white);">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="margin-bottom: 10px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                                <br>Click or drag your CV here to upload
                            </label>
                        </div>
                    </div>
                    <div class="form-group full-width" style="margin-top: 20px;">
                        <button type="submit" class="btn btn-primary" style="width: 100%;">SUBMIT APPLICATION</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer-minimal bg-black">
        <div class="container">
            <div class="footer-flex">
                <div class="logo">
                    <img src="assets/logo_emblem.png" alt="EH Logo" class="brand-icon" width="28" height="28" style="object-fit: contain; clip-path: circle(50%);">
                    <span>EASTERN HEMLOCK</span>
                </div>
                <p>&copy; 2026 Eastern Hemlock. All rights reserved.</p>
            </div>
        </div>
    </section>
